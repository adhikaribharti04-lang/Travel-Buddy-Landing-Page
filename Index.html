<!DOCTYPE html>
<html>
<head>
<title>Travel Buddy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#ff9a9e,
#fad0c4,
#a1c4fd,
#c2e9fb
);

background-size:400% 400%;
animation:bg 8s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:340px;
padding:35px;
text-align:center;

background:rgba(255,255,255,.2);
backdrop-filter:blur(20px);

border-radius:30px;
}

h1{
font-size:38px;
color:white;
margin-bottom:15px;
}

p{
color:white;
line-height:1.7;
margin-bottom:25px;
}

.btn{
display:block;
text-decoration:none;
padding:15px;
border-radius:30px;
background:#ff6b81;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>✈️ Explore The World</h1>

<p>
Discover beautiful destinations and
start your dream journey today.
</p>

<a href="signup.html" class="btn">
Start Journey
</a>

</div>

</body>
</html>
